<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Request - GlideLink</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config & Initialization -->
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "yourproject.firebaseapp.com",
            projectId: "yourproject",
            storageBucket: "yourproject.appspot.com",
            messagingSenderId: "1234567890",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>

<div class="container">
    <h1>GlideLink 🩸</h1>
    <h2>Blood Request Form</h2>

    <form id="receiverForm">

        <!-- Full Name -->
        <input type="text" 
               id="fullName" 
               placeholder="Enter Full Name" 
               required>

        <!-- Required Blood Group -->
        <select id="bloodGroup" required>
            <option value="">Select Required Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>

        <!-- Hospital Name -->
        <input type="text" 
               id="hospital" 
               placeholder="Hospital Name" 
               required>

        <!-- Location -->
        <input type="text" 
               id="location" 
               placeholder="City / Location" 
               required>

        <!-- Contact Number -->
        <input type="tel" 
               id="phone" 
               placeholder="Contact Number" 
               required>

        <!-- Urgency Level -->
        <select id="urgency" required>
            <option value="">Select Urgency Level</option>
            <option value="Normal">Normal</option>
            <option value="Emergency">Emergency</option>
        </select>

        <!-- Submit Button -->
        <button type="submit">Request Blood</button>

    </form>

    <br>
    <button onclick="window.location.href='role.html'">
        ⬅ Back
    </button>
</div>

<!-- Form Submission Script -->
<script>
const receiverForm = document.getElementById("receiverForm");

receiverForm.addEventListener("submit", function(e){
    e.preventDefault();

    const requestData = {
        fullName: document.getElementById("fullName").value,
        bloodGroup: document.getElementById("bloodGroup").value,
        hospital: document.getElementById("hospital").value,
        location: document.getElementById("location").value,
        phone: document.getElementById("phone").value,
        urgency: document.getElementById("urgency").value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    db.collection("requests").add(requestData)
    .then(() => {
        alert("Request Submitted Successfully!");
        receiverForm.reset();

        // Redirect to matching donors page
       window.location.href = `view-donors.html?bloodGroup=${requestData.bloodGroup}`;
    })
    .catch((error) => {
        alert("Error: " + error);
    });
});
</script>

</body>
</html>
