<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matching Donors - GlideLink</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "yourproject.firebaseapp.com",
            projectId: "yourproject",
            storageBucket: "yourproject.appspot.com",
            messagingSenderId: "1234567890",
            appId: "YOUR_APP_ID"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>
<div class="container">
    <h1>Matching Donors 🩸</h1>
    <div id="donorList">
        Loading donors...
    </div>
</div>

<script>
    // Get requested blood group from URL query (e.g., receiver.html?bloodGroup=A+)
    const params = new URLSearchParams(window.location.search);
    const requestedBlood = params.get("bloodGroup");

    const donorListDiv = document.getElementById("donorList");
    donorListDiv.innerHTML = "Loading donors...";

    // Query Firestore
    db.collection("donors").where("bloodGroup", "==", requestedBlood)
      .get()
      .then((snapshot) => {
          if (snapshot.empty) {
              donorListDiv.innerHTML = "<p>No donors found for this blood group.</p>";
              return;
          }

          donorListDiv.innerHTML = ""; // clear loading text

          snapshot.forEach((doc) => {
              const data = doc.data();
              const div = document.createElement("div");
              div.classList.add("donorCard");
              div.innerHTML = `
                <h3>${data.fullName}</h3>
                <p>Blood Group: ${data.bloodGroup}</p>
                <p>Phone: ${data.phone}</p>
                <p>Location: ${data.location}</p>
                <p>Availability: ${data.availability}</p>
              `;
              donorListDiv.appendChild(div);
          });
      })
      .catch((err) => {
          donorListDiv.innerHTML = "Error loading donors: " + err;
      });
</script>
</body>
</html>
